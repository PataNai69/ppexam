{s:"ACM Code of Ethics",q:"The ACM Code states that computing professionals should consider whether the results of their efforts will be used in socially responsible ways and:",o:["Be kept secret from the public.","Be sold only to the highest bidder.","Be patented without exception.","Be restricted to government use.","Be broadly accessible."],a:4},
{s:"ACM Code of Ethics",q:"Which of the following is NOT listed as an example of 'harm' in the ACM Code?",o:["Unjustified physical or mental injury.","Unjustified destruction or disclosure of information.","Unjustified damage to property.","Unjustified damage to reputation.","A competitor releasing a superior product."],a:4},
{s:"ACM Code of Ethics",q:"According to the ACM Code, when an unintended harm occurs from a well-intended action, those responsible are obliged to:",o:["Deny any responsibility.","Ignore the harm as it was not intentional.","Blame the user for the harm.","Continue as planned, hoping the harm goes away.","Undo or mitigate the harm as much as possible."],a:4},
{s:"ACM Code of Ethics",q:"The ACM Code emphasizes that computing professionals should promote environmental sustainability. This is a component of which principle?",o:["Avoid harm.","Respect the work required to produce new ideas.","Respect privacy.","Honor confidentiality.","Contribute to society and human well-being."],a:4},
{s:"ACM Code of Ethics",q:"The ACM Code is designed to:",o:["Provide a legal framework for prosecution.","Serve as an algorithm for solving all ethical problems.","Replace the need for individual moral judgment.","Guarantee that all computing projects will be ethical.","Inspire and guide the ethical conduct of all computing professionals."],a:4},
{s:"ACM Code of Ethics",q:"Which ACM principle requires computing professionals to be fair and take action not to discriminate?",o:["1.2 Avoid harm","1.3 Be honest and trustworthy","1.5 Respect intellectual property","1.6 Respect privacy","1.4 Be fair and take action not to discriminate"],a:4},
{s:"ACM Code of Ethics",q:"The ACM Code's principle of 'respecting the privacy of others' is found in which section?",o:["Section 1.2","Section 1.4","Section 2.1","Section 2.3","Section 1.6"],a:4},
{s:"ACM Code of Ethics",q:"The most recent major update to the ACM Code of Ethics and Professional Conduct was completed in which year?",o:["1992","2001","2010","2022","2018"],a:4},
{s:"ACM Code of Ethics",q:"According to the ACM Code, when the interests of multiple groups conflict, whose needs should be given increased attention and priority?",o:["The most profitable client.","The most powerful stakeholder.","The needs of the project manager.","The interests of the software development team.","The needs of those less advantaged."],a:4},
{s:"ACM Code of Ethics",q:"Which of the following is NOT a general ethical principle outlined in Section 1 of the ACM Code?",o:["Contribute to society and human well-being.","Respect the work required to produce new ideas.","Give proper credit for intellectual property.","Honor confidentiality.","Maximize personal returns on stock options."],a:4},
{s:"ACM Code of Ethics",q:"Principle 1.5 of the ACM Code, 'Respect the work required to produce new ideas, inventions, creative works, and computing artifacts,' is primarily about:",o:["Ensuring hardware is manufactured ethically.","Avoiding conflicts of interest.","Maintaining technical competence.","Promoting environmental sustainability.","Protecting intellectual property rights."],a:4},
{s:"ACM Code of Ethics",q:"The ACM Code explicitly states that the Code is not an algorithm for solving ethical problems. This means:",o:["The Code provides a definitive, step-by-step answer for every situation.","The Code is useless and should not be consulted.","The Code is only applicable to a small subset of ethical issues.","The Code is legally binding and its rules must be followed to the letter.","The Code requires professionals to apply thoughtful consideration to each unique situation."],a:4},
{s:"ACM Code of Ethics",q:"According to the ACM Code, a computing professional's obligation to 'avoid harm' includes:",o:["Harm to people only.","Harm to the environment only.","Harm that is intentional, but not unintentional harm.","Harm that is solely physical.","Harm to both people and the environment."],a:4},
{s:"IEEE-ACM Joint Code",q:"The joint IEEE-CS/ACM Software Engineering Code of Ethics and Professional Practice is structured around how many principles?",o:["5","10","12","15","8"],a:4},
{s:"IEEE-ACM Joint Code",q:"According to the joint Code, which principle dictates that software engineers shall act in accordance with the public interest?",o:["Client and Employer","Product","Judgment","Self","Public"],a:4},
{s:"IEEE-ACM Joint Code",q:"The principle of 'Product' in the joint IEEE-CS/ACM Code requires software engineers to:",o:["Maximize profits for their employer.","Keep product details a secret from the public.","Release software as quickly as possible, regardless of quality.","Focus only on features, not on security.","Ensure their products meet the highest professional standards."],a:4},
{s:"IEEE-ACM Joint Code",q:"Under the joint Code, a software engineer's primary loyalty should be to:",o:["The employer's profits.","Their own career advancement.","The specific programming language they prefer.","The country they reside in.","The public good."],a:4},
{s:"IEEE-ACM Joint Code",q:"The 'Client and Employer' principle of the joint Code states that software engineers shall act in a manner that is in the best interests of their client and employer, consistent with:",o:["The lowest possible cost.","The fastest delivery schedule.","The most advanced technology.","Their personal moral code only.","The public interest."],a:4},
{s:"IEEE-ACM Joint Code",q:"The principle of 'Judgment' in the joint Code requires software engineers to:",o:["Ignore the input of non-technical stakeholders.","Always defer to their manager's judgment.","Make decisions based solely on intuition.","Base all judgments on what is popular, not what is right.","Maintain integrity and independence in their professional judgment."],a:4},
{s:"IEEE-ACM Joint Code",q:"The principle of 'Self' in the joint Code states that software engineers shall participate in:",o:["Maximum profit generation.","Keeping their skills a secret from colleagues.","Working exclusively in a single domain.","Avoiding all forms of professional collaboration.","Lifelong learning regarding the practice of their profession."],a:4},
{s:"IEEE-ACM Joint Code",q:"A software engineer discovers that their company's flagship product has a security vulnerability that could expose customer data. According to the 'Public' principle, the engineer should:",o:["Remain silent to avoid angering management.","Quit their job immediately.","Sell the information about the vulnerability to a competitor.","Blame the problem on a different team.","Attempt to fix it and, if ignored, take appropriate steps to inform affected parties."],a:4},
{s:"IEEE-ACM Joint Code",q:"Which principle of the joint Code requires software engineers to ensure that their products and related modifications meet the highest professional standards possible?",o:["Public","Client and Employer","Judgment","Management","Product"],a:4},
{s:"IEEE-ACM Joint Code",q:"The joint Code expects software engineers to promote an ethical approach to the practice of the profession. This is explicitly part of which principle?",o:["Public","Client and Employer","Product","Management","Self"],a:4},
{s:"IEEE-ACM Joint Code",q:"According to the joint Code, software engineers shall not use their technical skills to misuse other people's computers. This is a subset of which broad principle?",o:["Public","Client and Employer","Product","Profession","Integrity"],a:4},
{s:"IEEE-ACM Joint Code",q:"The principle of 'Integrity' in the joint Code requires software engineers to:",o:["Compromise their integrity for the sake of the project.","Keep all project information secret, even from their team.","Prioritize company secrets over public safety.","Ignore any ethical concerns raised by others.","Maintain integrity and independence in their professional judgment."],a:4},
{s:"IEEE-ACM Joint Code",q:"A software engineer is asked to approve a project that they know has not been properly tested and could be unsafe. Which principle of the joint Code is most directly violated if they approve it?",o:["Management","Client and Employer","Self","Profession","Product"],a:4},
{s:"IEEE-ACM Joint Code",q:"The joint Code states that software engineers shall be fair to and supportive of their colleagues. This is a component of which principle?",o:["Public","Product","Client and Employer","Self","Colleagues"],a:4},
{s:"IEEE-ACM Joint Code",q:"According to the joint Code, if a software engineer's judgment is overruled in a matter that endangers life or property, they should:",o:["Do nothing, as they are not responsible.","Publicly protest the decision.","Accept the decision and move on.","Sabotage the project to prevent harm.","Notify their employer or client and, if necessary, take further steps."],a:4},
{s:"IEEE-ACM Joint Code",q:"The 'Management' principle of the joint Code requires software engineering managers to:",o:["Maximize productivity at any cost.","Take sole credit for the team's work.","Discourage team members from raising ethical concerns.","Prioritize project deadlines over team well-being.","Ensure that all team members have the necessary resources and training."],a:4},
{s:"IEEE-ACM Joint Code",q:"The principle of 'Profession' in the joint Code requires software engineers to:",o:["Keep the profession's knowledge and skills a secret.","Compete aggressively with other professionals.","Only work for companies that are ACM/IEEE members.","Refuse to teach or mentor junior engineers.","Advance the integrity and reputation of the profession."],a:4},
{s:"IEEE-ACM Joint Code",q:"A software engineer is asked to work on a project that they believe is in violation of the public interest. According to the joint Code, their first step should be to:",o:["Immediately go to the press.","Refuse the assignment with no explanation.","Work on the project but keep a detailed log.","Quit their job without any discussion.","Discuss the matter with their employer or client."],a:4},
{s:"IEEE-ACM Joint Code",q:"The 'Product' principle emphasizes that software engineers should ensure that their products are:",o:["Difficult to understand to ensure job security.","Released as quickly as possible to beat competitors.","Developed in total secrecy.","Profitable above all other considerations.","Safe, meet specifications, and pass appropriate tests."],a:4},
{s:"IEEE-ACM Joint Code",q:"According to the joint Code, a software engineer should 'respect the privacy of those who will be affected by their work.' This is an element of which principle?",o:["Client and Employer","Product","Integrity","Profession","Public"],a:4},
{s:"IEEE-ACM Joint Code",q:"The joint Code's principle of 'Colleagues' includes the responsibility to:",o:["Compete with colleagues for promotions.","Keep secrets from colleagues to gain an advantage.","Report all colleague mistakes to management.","Discourage colleagues from new ideas.","Assist colleagues in their professional development."],a:4},
{s:"IEEE-ACM Joint Code",q:"The joint Code states that software engineers shall participate in lifelong learning. This is found under the '________' principle.",o:["Product","Client and Employer","Integrity","Management","Self"],a:4},
{s:"IEEE-ACM Joint Code",q:"According to the joint Code, a software engineer's foremost commitment is to:",o:["Their employer.","Their client.","Their profession.","Their colleagues.","The public good."],a:4},
{s:"IEEE-ACM Joint Code",q:"A software engineer is about to leave a job for a competitor. According to the joint Code, their ethical duty to their current employer includes:",o:["Taking all source code with them.","Deleting all project documentation on their last day.","Actively recruiting their former colleagues to join their new company.","Publicly criticizing their former employer's products.","Maintaining confidentiality of their former employer's proprietary information."],a:4},
{s:"IEEE-ACM Joint Code",q:"The principle of 'Integrity' in the joint Code is closely related to the IEEE Code's prohibition of:",o:["Conflicts of interest.","Bribery.","Injuring others by false or malicious action.","None of the above.","All of the above."],a:4},
{s:"IEEE-ACM Joint Code",q:"According to the joint Code, when a software engineer has reason to believe that software is likely to be used for an unlawful purpose, they should:",o:["Continue working on it as instructed.","Make sure it is as bug-free as possible.","Add a warning message to the software.","Leak the information to a news outlet.","Refuse to participate in its development."],a:4},
{s:"IEEE-ACM Joint Code",q:"The joint Code's 'Profession' principle encourages software engineers to:",o:["Take on work in areas where they are not competent to gain experience.","Keep their technical knowledge a secret to maintain job security.","Prioritize their personal career advancement above all else.","Avoid reviewing the work of their peers.","Support other software engineers in following this code of ethics."],a:4},
{s:"IEEE-ACM Joint Code",q:"The joint Code of Ethics is intended to be:",o:["A legally binding document with criminal penalties.","A document only for academic study, not professional practice.","A set of suggestions that can be ignored when inconvenient.","A tool for employers to punish employees.","A set of guidelines that software engineers can use to make ethical decisions."],a:4},
{s:"IEEE-ACM Joint Code",q:"According to the joint Code, a software engineer should 'not knowingly use software that is obtained or retained either illegally or unethically.' This is an example of maintaining:",o:["Competence","Judgment","Self-interest","Professional reputation","Integrity"],a:4},
{s:"IEEE-ACM Joint Code",q:"A software engineer believes a project manager is making a technically unsound decision. According to the 'Judgment' principle, the engineer should:",o:["Obey the manager without question.","Report the manager to human resources.","Go behind the manager's back to a higher authority.","Publicly criticize the manager on social media.","Politely provide their professional opinion and the reasons for it."],a:4},
{s:"IEEE-ACM Joint Code",q:"The joint Code states that software engineers shall 'approve software only if they have a well-founded belief that it is safe, meets specifications, passes appropriate tests...' This is a requirement of which principle?",o:["Integrity","Client and Employer","Public","Management","Product"],a:4},
{s:"IEEE-ACM Joint Code",q:"According to the joint Code, when a software engineer determines that a project cannot be completed ethically, they should:",o:["Do the unethical work but donate their fee to charity.","Quietly resign from the project.","Complete the work but leak the information to the press.","Ignore their concerns and complete the work.","Report the issue to their employer or client and, if no resolution is found, consider further action."],a:4},
{s:"IEEE-ACM Joint Code",q:"The joint Code's 'Management' principle states that managers should ensure that policies and procedures are:",o:["Secret and known only to management.","Changed daily to keep employees on their toes.","Designed to maximize the manager's personal bonus.","Written in the most complex legal language possible.","Fairly and accurately reported to all stakeholders."],a:4},
{s:"IEEE-ACM Joint Code",q:"The joint Code's 'Colleagues' principle includes a duty to:",o:["Take credit for a colleague's work if the colleague is absent.","Undermine colleagues who are competing for a promotion.","Keep all feedback to oneself to avoid hurting feelings.","Only provide positive feedback to colleagues.","Review the work of colleagues in an objective, candid, and properly documented way."],a:4},
{s:"IEEE-ACM Joint Code",q:"A software engineer is offered a large sum of money to reveal a security flaw in their employer's product to a competitor. Accepting this bribe would violate which principles of the joint Code?",o:["Integrity and Client/Employer only","Public and Self only","Management and Colleagues only","Product and Profession only","All of the above."],a:4},
{s:"IEEE-ACM Joint Code",q:"The joint Code explicitly states that software engineers shall 'be fair to and supportive of their colleagues.' This includes:",o:["Discouraging colleagues from exploring new technologies.","Taking credit for a colleague's work when possible.","Competing with colleagues for the same recognition.","Ignoring a colleague's request for help.","Assisting colleagues in being informed of their current work."],a:4},
{s:"IEEE-ACM Joint Code",q:"According to the 'Public' principle of the joint Code, software engineers shall:",o:["Only serve the interests of their employer, even at the public's expense.","Act in the public interest only if it does not conflict with their job.","Disregard the public interest as it is too broad to define.","Follow the public's opinion on social media.","Act consistently with the public interest."],a:4},
{s:"IEEE-ACM Joint Code",q:"The primary purpose of having both an ACM Code and an IEEE-CS/ACM joint Code is to:",o:["Confuse software engineers with multiple sets of rules.","Compete with each other for members.","Replace all legal systems in technology.","Ensure that all software is proprietary.","Provide a comprehensive ethical framework for all computing professionals, with the joint Code focusing specifically on software engineering."],a:4},
{s:"ACM Code of Ethics",q:"Which ACM general principle states that professionals should 'respect the autonomy of individuals' and 'protect each individual's right to self-determination'?",o:["Avoid harm","Be honest and trustworthy","Respect privacy","Honor confidentiality","Contribute to society and human well-being"],a:4},
{s:"ACM Code of Ethics",q:"According to the ACM Code, when harm is an intentional part of a system, those responsible are obligated to:",o:["Proceed with the design as planned.","Hide the harmful aspects from users.","Minimize documentation to avoid liability.","Outsource the system development to another team.","Ensure the harm is ethically justified."],a:4},
{s:"ACM Code of Ethics",q:"A computing professional is asked to work on a project that will produce a product that could be used by an oppressive regime to monitor its citizens. Which ACM principle is most directly relevant?",o:["Respect intellectual property","Respect privacy","Honor confidentiality","Know and respect existing rules","Contribute to society and human well-being"],a:4},
{s:"ACM Code of Ethics",q:"The ACM Code is intended to apply to:",o:["Only ACM members.","Only professional software developers.","Only managers and executives in tech companies.","Only individuals working in the United States.","All computing professionals, including students and aspiring practitioners."],a:4},
{s:"ACM Code of Ethics",q:"According to the ACM Code, if a computing professional is faced with an ethical dilemma, they should understand that:",o:["The Code provides one clear answer that is always correct.","The only option is to consult a lawyer.","The dilemma is a sign that they are in the wrong profession.","They should ignore the dilemma and proceed with the project.","Multiple principles may apply, and they will have different relevance."],a:4},
{s:"ACM Code of Ethics",q:"The ACM Code's principle of 'giving proper credit for intellectual property' (1.5) is most analogous to:",o:["Avoiding conflicts of interest.","Maintaining technical competence.","Avoiding bribery.","Assisting colleagues' development.","Avoiding plagiarism."],a:4},
{s:"ACM Code of Ethics",q:"Which section of the ACM Code provides principles for individuals who have a leadership role in the workplace?",o:["Section 1","Section 2","Section 4","The Preamble","Section 3"],a:4},
{s:"ACM Code of Ethics",q:"A software engineer copies an entire module of code from an open-source project into their company's proprietary product without any attribution. This is a clear violation of which ACM principle?",o:["Avoid harm","Be honest and trustworthy","Respect privacy","Honor confidentiality","Respect the work required to produce new ideas"],a:4},
{s:"ACM Code of Ethics",q:"According to the ACM Code, a computing professional who is aware of a potential ethical violation by a colleague has a responsibility to:",o:["Ignore it to maintain a good working relationship.","Report it anonymously to avoid any personal risk.","Publicly shame the colleague on social media.","Quit their job to avoid being associated with it.","Address the matter through appropriate channels."],a:4},
{s:"ACM Code of Ethics",q:"The ACM Code was last updated in 2018 to address:",o:["The ethical issues of mainframe computing.","A decline in membership numbers.","The specific needs of hardware engineers only.","The legalization of hacking for security research.","The growing pervasiveness of computing in all aspects of society."],a:4},
{s:"ACM Code of Ethics",q:"The ACM Code's principle of 'avoiding harm' obligates a professional to undo or mitigate harm. This duty applies when the harm is:",o:["Intentional and malicious.","Caused by a user, not the system.","Caused by a third-party component.","Only when it results in legal liability.","Unintended."],a:4},
{s:"ACM Code of Ethics",q:"The requirement that the public good is the 'primary consideration' in the ACM Code means that in cases of conflict, it should take precedence over:",o:["An employer's financial interests only.","A client's specific demands only.","A professional's career advancement only.","Only the law.","All of the above."],a:4},
{s:"ACM Code of Ethics",q:"Principle 2.1 of the ACM Code states that computing professionals should 'strive to achieve high quality in both the processes and products of their work.' This is a commitment to:",o:["Honesty.","Fairness.","Avoiding harm.","Confidentiality.","Professional competence."],a:4},
{s:"ACM Code of Ethics",q:"According to the ACM Code, a computing professional's duty to 'respect privacy' (1.6) includes an obligation to:",o:["Collect as much data as possible from users.","Sell user data to the highest bidder.","Share user data freely with government agencies.","Keep all data secret, even from the user.","Use collected data only for the purposes for which it was intended."],a:4},
{s:"ACM Code of Ethics",q:"The ACM Code's principle of 'honoring confidentiality' (1.7) is a key part of the ethical duty owed to:",o:["The general public.","The environment.","Future generations of engineers.","Open-source communities.","Employers and clients."],a:4},

// ===== SECTION 4: IEEE CODE (Q161-220) =====
{s:"IEEE Code of Ethics",q:"According to the IEEE Code of Ethics, members commit to making decisions consistent with the safety, health, and welfare of the:",o:["Employer.","Client.","Fellow engineers.","The IEEE organization itself.","Public."],a:4},
{s:"IEEE Code of Ethics",q:"The IEEE Code of Ethics currently consists of how many principles?",o:["5","8","12","15","10"],a:4},
{s:"IEEE Code of Ethics",q:"Under the IEEE Code, members are obligated to 'disclose promptly factors that might endanger the ______ or the environment.'",o:["Employer","Project budget","Company's reputation","Source code","Public"],a:4},
{s:"IEEE Code of Ethics",q:"The IEEE Code of Ethics states that members should avoid real or perceived ______ of interest whenever possible.",o:["Benefits","Mergers","Opportunities","Resolutions","Conflicts"],a:4},
{s:"IEEE Code of Ethics",q:"When making claims or estimates, the IEEE Code requires members to be:",o:["Optimistic and ambitious.","Conservative and cautious.","Vague and general.","Ambitious and visionary.","Honest and realistic."],a:4},
{s:"IEEE Code of Ethics",q:"Which of the following is explicitly forbidden by the IEEE Code of Ethics in all its forms?",o:["Overtime work.","Remote work.","Open-source software.","Competitive bidding.","Bribery."],a:4},
{s:"IEEE Code of Ethics",q:"The IEEE Code encourages members to do what with the understanding of technology and its potential consequences?",o:["Limit it to a small group of experts.","Keep it confidential for competitive advantage.","Patent it for personal profit.","Simplify it to the point of being misleading.","Improve it."],a:4},
{s:"IEEE Code of Ethics",q:"According to the IEEE Code, members should undertake technological tasks for others only if:",o:["They can outsource the work to a cheaper provider.","It will generate the highest profit margin.","The project deadline is very short.","They have a personal connection with the client.","They are qualified by training or experience."],a:4},
{s:"IEEE Code of Ethics",q:"The IEEE Code expects members to seek, accept, and offer honest criticism of technical work and to:",o:["Defend their work at all costs.","Hide any errors they find.","Blame others for any mistakes.","Refuse to review the work of peers.","Acknowledge and correct errors."],a:4},
{s:"IEEE Code of Ethics",q:"Treating all persons fairly regardless of race, religion, gender, disability, age, or national origin is mandated by which principle of the IEEE Code?",o:["Principle 1","Principle 3","Principle 6","Principle 10","Principle 8"],a:4},
{s:"IEEE Code of Ethics",q:"The IEEE Code's 9th principle directly addresses the prohibition of:",o:["Working on projects outside of one's specialty.","Accepting gifts from clients.","Disclosing company secrets.","Taking vacation time.","Injuring others by false or malicious action."],a:4},
{s:"IEEE Code of Ethics",q:"Assisting colleagues and co-workers in their professional development is the focus of which IEEE Code principle?",o:["Principle 2","Principle 4","Principle 7","Principle 9","Principle 10"],a:4},
{s:"IEEE Code of Ethics",q:"The current version of the IEEE Code of Ethics was approved by the IEEE Board of Directors in:",o:["1912","1950","1974","2010","1990"],a:4},
{s:"IEEE Code of Ethics",q:"The IEEE Code states that members should maintain and improve their technical:",o:["Fortune","Network","Standing","Reputation","Competence"],a:4},
{s:"IEEE Code of Ethics",q:"Under the IEEE Code, if a conflict of interest does exist, a member must:",o:["Ignore it and proceed as planned.","Resign from their position immediately.","Transfer the project to a family member.","Keep it a secret to avoid embarrassment.","Disclose it to affected parties."],a:4},
{s:"IEEE Code of Ethics",q:"The IEEE Code emphasizes that its members should 'hold paramount' the safety, health, and welfare of the public. The word 'paramount' in this context means:",o:["As a secondary consideration.","As a last resort.","Only when it is convenient.","Only when it does not conflict with company profits.","As the highest or most important consideration."],a:4},
{s:"IEEE Code of Ethics",q:"Which IEEE principle is most directly related to the responsible use and disclosure of data when making engineering claims?",o:["Principle 1 (Public welfare)","Principle 5 (Improve understanding of technology)","Principle 7 (Seek, accept, and offer honest criticism)","Principle 9 (Avoid injuring others)","Principle 3 (Honest and realistic claims)"],a:4},
{s:"IEEE Code of Ethics",q:"The IEEE Code expects members to properly credit the contributions of others. This is most closely related to which principle?",o:["Principle 2 (Avoid conflicts of interest)","Principle 4 (Reject bribery)","Principle 6 (Maintain technical competence)","Principle 8 (Treat all persons fairly)","Principle 7 (Acknowledge and correct errors, credit others)"],a:4},
{s:"IEEE Code of Ethics",q:"According to the IEEE Code, a member who is not qualified by training or experience for a project should:",o:["Take the project anyway and learn on the job.","Hire an unqualified friend to do the work.","Submit a bid that is far below market value.","Copy code from an open-source project without attribution.","Decline the project or make a full disclosure of their limitations."],a:4},
{s:"IEEE Code of Ethics",q:"The IEEE Code's principle on 'avoiding injuring others' covers harm to:",o:["Property only.","Reputation only.","Employment only.","Only physical persons, not their property.","Persons, property, reputation, and employment."],a:4},
{s:"IEEE Code of Ethics",q:"The foundational principle for all other principles in the IEEE Code of Ethics is most likely to be:",o:["Maintaining technical competence.","Avoiding conflicts of interest.","Assisting colleagues in their professional development.","Rejecting bribery.","Upholding the safety, health, and welfare of the public."],a:4},
{s:"IEEE Code of Ethics",q:"According to the IEEE Code, members should avoid injuring others. What does the code say about injury caused by 'false or malicious action'?",o:["It is acceptable if it benefits the company.","It is only a violation if it causes physical harm.","It is a minor infraction, not a serious one.","It is only a concern for managers, not individual members.","It is explicitly prohibited."],a:4},
{s:"IEEE Code of Ethics",q:"The IEEE Code of Ethics applies to:",o:["Only IEEE members who are also licensed engineers.","Only the IEEE Board of Directors.","Only IEEE members working in the United States.","Only IEEE members who work for large corporations.","All members of IEEE in any grade."],a:4},
{s:"IEEE Code of Ethics",q:"The IEEE Code's principle of 'treating fairly all persons' explicitly includes non-discrimination based on which of the following factors?",o:["Age and national origin only.","Gender and disability only.","Race and religion only.","Sexual orientation and gender identity only.","All of the above."],a:4},
{s:"IEEE Code of Ethics",q:"When a member of IEEE is placed in jeopardy as a consequence of adhering to the IEEE Code of Ethics, the IEEE may offer:",o:["Financial compensation for lost wages.","Legal representation to sue their employer.","A public condemnation of the employer.","No assistance, as it is a personal matter.","Assistance, if warranted by the Board of Directors."],a:4},
{s:"IEEE Code of Ethics",q:"The IEEE Code commits members to 'improve the understanding of technology, its ______ application, and potential consequences.'",o:["Profitable","Rapid","Secret","Experimental","Appropriate"],a:4},
{s:"IEEE Code of Ethics",q:"Which IEEE principle directly encourages a culture of peer review and constructive feedback?",o:["Principle 5: To improve the understanding of technology.","Principle 6: To maintain and improve our technical competence.","Principle 8: To treat fairly all persons.","Principle 10: To assist colleagues and co-workers.","Principle 7: To seek, accept, and offer honest criticism of technical work."],a:4},
{s:"IEEE Code of Ethics",q:"According to the IEEE Code, what is a member's duty if they make an error in their technical work?",o:["Conceal it to avoid embarrassment for themselves or their company.","Blame a team member or external vendor.","Quit their job before anyone finds out.","Delete all records of the error.","Acknowledge and correct the error."],a:4},
{s:"IEEE Code of Ethics",q:"The IEEE Code's requirement to 'reject bribery' is an example of a principle promoting:",o:["Technical competence.","Professional development.","Public safety.","Environmental protection.","Integrity and impartiality."],a:4},
{s:"IEEE Code of Ethics",q:"The IEEE Code was most recently revised in 1990. What was the year of the first IEEE (then AIEE) Code of Ethics?",o:["1884","1900","1950","1974","1912"],a:4},
{s:"IEEE Code of Ethics",q:"Which IEEE principle is primarily concerned with ensuring that a professional does not take credit for the work of others?",o:["Principle 1: Public welfare.","Principle 4: Reject bribery.","Principle 9: Avoid injuring others.","Principle 10: Assist colleagues.","Principle 7: Credit properly the contributions of others."],a:4},
{s:"IEEE Code of Ethics",q:"The IEEE Code of Ethics expects members to support others in following the code. This is explicitly mentioned in which principle?",o:["Principle 2 (Disclose conflicts of interest)","Principle 5 (Improve understanding)","Principle 8 (Treat fairly)","Principle 9 (Avoid injuring others)","Principle 10 (Assist colleagues and co-workers)"],a:4},
{s:"IEEE Code of Ethics",q:"In the context of the IEEE Code, what does 'real or perceived conflicts of interest' mean?",o:["Only actual conflicts are a concern; appearances are irrelevant.","Conflicts of interest are always acceptable if they are disclosed after the fact.","Only financial conflicts of interest matter.","Conflicts are only a concern for senior management.","Even the appearance of a conflict can be damaging and should be avoided."],a:4},
{s:"IEEE Code of Ethics",q:"The IEEE Code's commitment to 'the highest ethical and professional conduct' is a pledge made in recognition of the importance of IEEE's technologies in affecting:",o:["The profitability of its member companies.","The global standing of the United States.","The membership numbers of the IEEE.","The development of newer, faster computers.","The quality of life throughout the world."],a:4},
{s:"IEEE Code of Ethics",q:"A software engineer is offered a job by a vendor that their company is currently evaluating. The engineer is in a position to influence the contract decision. According to the IEEE Code, this situation represents:",o:["An acceptable business practice.","A clear-cut case of bribery.","A normal career advancement opportunity.","A situation that does not involve any ethical considerations.","A potential conflict of interest that must be disclosed."],a:4},
{s:"IEEE Code of Ethics",q:"Which IEEE principle is most directly applicable when an engineer discovers their company is about to release a product that does not meet environmental safety standards?",o:["Principle 6 (Maintain technical competence)","Principle 8 (Treat all persons fairly)","Principle 4 (Reject bribery)","Principle 2 (Avoid conflicts of interest)","Principle 1 (Public safety, health, and welfare)"],a:4},
{s:"IEEE Code of Ethics",q:"The IEEE Code's principle of 'assisting colleagues and co-workers in their professional development' is a call for:",o:["Competition and individual achievement.","Outsourcing professional development to external firms.","Requiring all colleagues to attend the same training.","Prioritizing senior engineers over junior ones.","Mentorship and knowledge sharing."],a:4},
{s:"IEEE Code of Ethics",q:"An IEEE member is asked to review a technical paper containing an idea similar to one they are developing. According to the IEEE Code, their duty is to:",o:["Reject the paper and submit their own idea first.","Criticize the paper unfairly to suppress the idea.","Steal the idea and claim it as their own.","Refuse to review the paper on principle.","Be honest and fair in their criticism and credit the author if they use the idea."],a:4},
{s:"IEEE Code of Ethics",q:"Which of the following actions would be a direct violation of the IEEE Code of Ethics?",o:["Taking a new job with a competitor.","Publicly disclosing a potential environmental risk from a project.","Asking for a salary increase based on market rates.","Using open-source software in a commercial product.","Falsifying data on a project report to make it look more successful."],a:4},
{s:"IEEE Code of Ethics",q:"The IEEE Code of Ethics is best described as:",o:["A set of unenforceable suggestions.","A legal document with the force of law.","A contract that only applies to IEEE staff.","An optional guideline for career success.","A personal commitment to the highest ethical and professional conduct."],a:4},
{s:"IEEE Code of Ethics",q:"Which IEEE principle obligates members to 'avoid injuring others, their property, reputation, or employment by false or malicious action'?",o:["Principle 7","Principle 8","Principle 10","Principle 5","Principle 9"],a:4},
{s:"IEEE Code of Ethics",q:"According to IEEE Principle 2, members should avoid conflicts of interest. Whenever possible, they should:",o:["Disclose them only after the project is complete.","Ignore them if they are minor.","Use them to gain a competitive advantage.","Report them to law enforcement.","Avoid them entirely or disclose them to affected parties."],a:4},
{s:"IEEE Code of Ethics",q:"IEEE Principle 3 requires members to be 'honest and realistic in stating claims or estimates.' This applies to:",o:["Only financial claims.","Only technical performance claims.","Only claims made to the media.","Only claims made in academic papers.","All claims, including estimates of project cost and schedule."],a:4},
{s:"IEEE Code of Ethics",q:"Under IEEE Principle 4, rejection of bribery is required. This includes:",o:["Only cash bribes.","Only bribes from foreign entities.","Only bribes that are illegal under local law.","Only bribes over $100.","Any form of undue influence, including gifts or favors."],a:4},
{s:"IEEE Code of Ethics",q:"IEEE Principle 5 commits members to 'improve the understanding of technology, its appropriate application, and potential consequences.' Who is the primary audience for this improved understanding?",o:["Only IEEE members.","Only corporate shareholders.","Only government regulators.","Only the member's immediate supervisor.","The public and other stakeholders."],a:4},
{s:"IEEE Code of Ethics",q:"IEEE Principle 6 requires members to 'maintain and improve our technical competence.' This can be achieved by:",o:["Only formal university courses.","Memorizing old technical manuals.","Avoiding new technologies to reduce risk.","Delegating all technical work to junior staff.","Continuous learning, training, and staying current with new technologies."],a:4},
{s:"IEEE Code of Ethics",q:"IEEE Principle 7 encourages members to 'seek, accept, and offer honest criticism of technical work.' A practical application of this is:",o:["Never criticizing a colleague's work to avoid conflict.","Only accepting criticism from managers.","Rejecting all feedback as subjective.","Publishing criticism anonymously.","Conducting constructive peer code reviews."],a:4},
{s:"IEEE Code of Ethics",q:"IEEE Principle 8 states that members should 'treat fairly all persons and not engage in acts of discrimination.' This includes:",o:["Discriminating based on experience level.","Favoring friends in hiring.","Ignoring diversity and inclusion policies.","Only treating fellow IEEE members fairly.","Ensuring equal opportunity regardless of protected characteristics."],a:4},
{s:"IEEE Code of Ethics",q:"According to IEEE Principle 9, injuring others by 'false or malicious action' is prohibited. This covers:",o:["Making a mistake in a calculation.","Unintentionally causing a software bug.","Criticizing a colleague's work privately.","Competing for a promotion.","Spreading false rumors about a competitor's product."],a:4},
{s:"IEEE Code of Ethics",q:"IEEE Principle 10 calls on members to 'assist colleagues and co-workers in their professional development.' This could include:",o:["Hoarding knowledge to be indispensable.","Discouraging attendance at conferences.","Taking credit for a colleague's idea.","Avoiding sharing resources.","Mentoring a junior engineer."],a:4},
{s:"IEEE Code of Ethics",q:"Which IEEE principle is most directly violated if an engineer uses insider information to trade stock in a vendor company?",o:["Principle 1 (Public welfare)","Principle 4 (Reject bribery)","Principle 6 (Technical competence)","Principle 9 (Avoid injuring others)","Principle 2 (Conflicts of interest)"],a:4},
{s:"IEEE Code of Ethics",q:"An engineer discovers a potential safety hazard in a bridge design software they are testing. According to IEEE Principle 1, they should:",o:["Ignore it because they are not the bridge designer.","Keep it secret to avoid liability.","Only report it to their manager and hope it gets fixed.","Exploit the hazard for personal gain.","Immediately disclose the hazard to the software's users and the public."],a:4},
{s:"IEEE Code of Ethics",q:"Which IEEE principle requires engineers to 'credit properly the contributions of others'?",o:["Principle 3 (Honest claims)","Principle 8 (Treat fairly)","Principle 9 (Avoid injuring)","Principle 10 (Assist colleagues)","Principle 7 (Honest criticism and credit)"],a:4},
{s:"IEEE Code of Ethics",q:"According to IEEE Principle 3, an engineer who underestimates the project timeline to win a contract, despite knowing it is unrealistic, is violating:",o:["Technical competence.","Avoiding conflicts of interest.","Assisting colleagues.","Treating fairly.","Honesty and realistic claims."],a:4},
{s:"IEEE Code of Ethics",q:"IEEE Principle 4's rejection of bribery is essential because bribery:",o:["Is efficient and saves time.","Is legal in some countries.","Only affects small companies.","Is a normal business practice.","Undermines fair competition and integrity."],a:4},
{s:"IEEE Code of Ethics",q:"Which IEEE principle encourages engineers to stay informed about the potential environmental consequences of their work?",o:["Principle 2 (Conflicts of interest)","Principle 6 (Technical competence)","Principle 8 (Treat fairly)","Principle 10 (Assist colleagues)","Principle 5 (Improve understanding of technology)"],a:4},
{s:"IEEE Code of Ethics",q:"A manager asks an engineer to approve a design that the engineer knows is flawed. According to IEEE Principle 1, the engineer should:",o:["Approve it to keep their job.","Approve it but add a disclaimer.","Quit silently.","Approve it and hope no one gets hurt.","Refuse to approve and explain the risk to public safety."],a:4},
{s:"IEEE Code of Ethics",q:"IEEE Principle 8 (treating all persons fairly) would be violated by:",o:["Offering a mentorship to a junior employee.","Providing flexible work hours for parents.","Conducting blind resume reviews.","Promoting based on merit.","Paying women less than men for the same role."],a:4},
{s:"IEEE Code of Ethics",q:"Under IEEE Principle 9, making a false statement that damages a competitor's reputation is:",o:["Acceptable business competition.","Protected free speech.","Encouraged for market advantage.","Only a violation if the competitor is an IEEE member.","A violation of the Code."],a:4},
{s:"IEEE Code of Ethics",q:"The IEEE Code's 10 principles are considered:",o:["Suggestions that may be ignored.","A binding contract for all members.","Legal statutes enforceable by law.","Outdated historical documents.","A framework for ethical conduct that members voluntarily commit to."],a:4},

{s:"Accountability & Auditing",q:"Accountability in software engineering means:",o:["Avoiding all responsibility for failures.","Blaming users for bugs.","Never making mistakes.","Delegating all tasks to others.","Being answerable for the outcomes of one's actions and decisions."],a:4},

{s:"Accountability & Auditing",q:"Which of the following is a key element of accountability for a software engineer?",o:["Denying any involvement in bugs.","Avoiding code reviews.","Blaming the testing team for missed requirements.","Deleting logs after a failure.","Documenting decisions and accepting responsibility for their work."],a:4},
{s:"Accountability & Auditing",q:"A 'compliance audit' ensures that an organization adheres to:",o:["Only internal policies.","The personal preferences of the CEO.","Customer satisfaction scores.","Stock market predictions.","Laws, regulations, and standards (e.g., GDPR, HIPAA, PCI-DSS)."],a:4},
{s:"Accountability & Auditing",q:"When a data breach occurs, accountability requires that:",o:["The breach is covered up to protect reputation.","The blame is placed on a single junior employee.","No one is informed.","The auditors are fired.","Responsible parties are identified and corrective actions taken."],a:4},

init();

const sColors={
  "Scope of Computing":"#1565c0",
  "Professional Traits":"#2e7d32",
  "ACM Code of Ethics":"#6a1b9a",
  "IEEE-ACM Joint Code":"#4a148c",
  "IEEE Code of Ethics":"#bf360c",
  "Accountability & Auditing":"#e65100",
  "Social Applications of Ethics":"#00695c"
};

function render(){
  let h='';
  for(let i=0;i<raw.length;i++){
    const q=raw[i],ans=answered[i];
    const col=sColors[q.s]||'#1565c0';
    h+=`<div class="qcard" id="qc${i}">
      <span class="section-badge" style="background:${col}15;color:${col}">${q.s}</span>
      <div class="qnum">Question ${i+1} / ${raw.length}</div>
      <div class="qtxt">${q.q}</div>
      <div class="opts">`;

    if(quizMode){
      // Quiz mode: click karo, foran result milega
      const chk=quizChecked[i];
      const sel=quizSelections[i];
      q.o.forEach((o,j)=>{
        let cls='quiz-opt-btn';
        if(chk){
          if(j===q.a) cls+=' result-corr';
          else if(j===sel&&sel!==q.a) cls+=' result-wrng';
        }
        h+=`<button class="${cls}" onclick="quizMark(${i},${j})"${chk?' disabled':''}>${K[j]}) ${o}</button>`;
      });
      h+='</div>';
      if(chk){
        const correct=sel===q.a;
        h+=correct?`<div class="fb ok">✓ Correct!</div>`:`<div class="fb no">✗ Wrong! Correct answer: ${K[q.a]}) ${q.o[q.a]}</div>`;
      }
    } else {
      // Normal or Prep mode
      q.o.forEach((o,j)=>{
        let c='opt';
        if(prepMode){
          if(j===q.a) c+=' prep-corr';
        } else {
          if(ans!==null){if(j===q.a)c+=' shwc';else if(j===ans&&ans!==q.a)c+=' wrng';}
        }
        const disabled=(ans!==null||prepMode)?' disabled':'';
        h+=`<button class="${c}" onclick="pick(${i},${j})"${disabled}><span class="ok">${K[j]})</span>${o}</button>`;
      });
      h+='</div>';
      if(!prepMode&&ans!==null){h+=ans===q.a?`<div class="fb ok">✓ Correct!</div>`:`<div class="fb no">✗ Wrong! Correct answer: ${K[q.a]}) ${q.o[q.a]}</div>`;}
    }
    h+='</div>';
  }
  document.getElementById('qa').innerHTML=h;
  document.getElementById('scor').textContent=corr;
  document.getElementById('swrg').textContent=wrng;
  const done=answered.filter(a=>a!==null).length;
  document.getElementById('prog').style.width=Math.round(done/raw.length*100)+'%';
  document.getElementById('pginfo').textContent=`Total Questions: ${raw.length}`;
}

function quizMark(i,j){
  if(quizChecked[i])return;
  quizChecked[i]=true;
  quizSelections[i]=j;
  const q=raw[i];
  const correct=(j===q.a);
  if(correct) corr++; else wrng++;
  document.getElementById('scor').textContent=corr;
  document.getElementById('swrg').textContent=wrng;
  const done=Object.keys(quizChecked).length;
  document.getElementById('prog').style.width=Math.round(done/raw.length*100)+'%';

  const card=document.getElementById('qc'+i);
  const btns=card.querySelectorAll('.quiz-opt-btn');
  btns.forEach((b,idx)=>{
    b.className='quiz-opt-btn';
    if(idx===q.a) b.classList.add('result-corr');
    else if(idx===j&&!correct) b.classList.add('result-wrng');
    b.disabled=true;
  });
  const fb=document.createElement('div');
  fb.className=correct?'fb ok':'fb no';
  fb.textContent=correct?'✓ Correct!':`✗ Wrong! Correct answer: ${K[q.a]}) ${q.o[q.a]}`;
  card.appendChild(fb);
}

function pick(i,j){
  if(answered[i]!==null)return;
  answered[i]=j;
  if(j===raw[i].a)corr++;else wrng++;
  render();
  document.getElementById('qc'+i).scrollIntoView({behavior:'smooth',block:'nearest'});
}

function togglePrep(){
  if(quizMode){quizMode=false;document.getElementById('qzmBtn').classList.remove('active');}
  prepMode=!prepMode;
  document.getElementById('prepBtn').classList.toggle('active',prepMode);
  const banner=document.getElementById('modeBanner');
  banner.innerHTML=prepMode?'<div class="mode-banner prep">📖 Preparation Mode — All correct answers are highlighted</div>':'';
  render();
}

function toggleQuiz(){
  if(prepMode){prepMode=false;document.getElementById('prepBtn').classList.remove('active');}
  quizMode=!quizMode;
  document.getElementById('qzmBtn').classList.toggle('active',quizMode);
  const banner=document.getElementById('modeBanner');
  banner.innerHTML=quizMode?'<div class="mode-banner quiz">✏️ Quiz Mode — Click an option to instantly see if you are right or wrong</div>':'';
  render();
}

function resetAll(){
  init();
  document.getElementById('prepBtn').classList.remove('active');
  document.getElementById('qzmBtn').classList.remove('active');
  document.getElementById('modeBanner').innerHTML='';
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

render();
</script>
</script>
</body>
</html>
